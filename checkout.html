<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout - Makerere Tech Store</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Secure Checkout</h1>
        <nav>
            <a href="index.html">Home</a>
            <!-- Compulsory Feature 5: Cart Counter [3] -->
            <a href="cart.html">Cart (<span id="cart-count">0</span>)</a>
            <a href="checkout.html">Checkout</a>
        </nav>
    </header>

    <main id="checkout-container">
        <!-- Display Total Cost: Compulsory Requirement [4, 5] -->
        <section id="checkout-summary">
            <h2>Order Summary</h2>
            <div class="summary-box">
                <p>Total Amount Due:</p>
                <h2 id="checkout-total-display">UGX 0</h2>
            </div>
        </section>

        <!-- Compulsory Feature 9: Checkout Form [1] -->
        <section id="form-section">
            <form id="checkout-form">
                <div class="form-group">
                    <label for="name">Full Name</label>
                    <input type="text" id="name" placeholder="Enter your full name">
                </div>
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" placeholder="email@example.com">
                </div>
                <div class="form-group">
                    <label for="phone">Phone Number</label>
                    <input type="tel" id="phone" placeholder="e.g., 0700000000">
                </div>
                <div class="form-group">
                    <label for="address">Delivery Address</label>
                    <textarea id="address" placeholder="Enter street and city"></textarea>
                </div>

                <h3>Payment Method</h3>
                <div class="payment-options">
                    <label><input type="radio" name="payment" value="mobile_money"> Mobile Money</label>
                    <label><input type="radio" name="payment" value="card"> Credit/Debit Card</label>
                    <label><input type="radio" name="payment" value="cash"> Cash on Delivery</label>
                </div>


<!-- Toggle Divs for Payment Logic -->
<div id="mobileMoneyDetails" style="display:none;" class="payment-box">
    <p>Enter your Mobile Money Number:</p>
    <!-- Use id="phone" for selection and maxlength to limit input -->
    <input type="text" id="phone2" placeholder="07XXXXXXXX" maxlength="10">
</div>

                <div id="cardDetails" style="display:none;" class="payment-box">
                    <p>Enter Card Information:</p>
                    <input type="text" placeholder="Card Number">
                </div>

                <!-- Compulsory Error Handling Area [1] -->
                <div id="error-message" style="color: red; margin-bottom: 10px;"></div>

                <button type="button" onclick="validateCheckout()" id="place-order-btn">Complete Purchase</button>
            </form>
        </section>
    </main>

    <script src="js/script.js"></script>
</body>
</html>
