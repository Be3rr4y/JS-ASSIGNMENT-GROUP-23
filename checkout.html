<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout - Makerere Tech Store</title>
    <!-- Link to the project's shared CSS file -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Secure Checkout</h1>
        <nav>
            <a href="index.html">Home</a>
            <a href="cart.html">Cart</a>
            <a href="checkout.html">Checkout</a>
        </nav>
    </header>

    <main id="checkout-container">
        <section id="order-summary-box">
            <h2>Your Order</h2>
            <div id="checkout-items">
                <!-- JavaScript will display a summary of items here -->
            </div>
            <p><strong>Total Amount: </strong> <span id="checkout-total">$0.00</span></p>
        </section>

        <!-- Compulsory Feature 9: Checkout Form -->
        <section id="form-section">
            <h2>Shipping Information</h2>
            <form id="checkout-form">
                <div class="form-group">
                    <label for="name">Full Name:</label>
                    <input type="text" id="name" name="name" placeholder="Enter your full name">
                </div>

                <div class="form-group">
                    <label for="email">Email Address:</label>
                    <input type="email" id="email" name="email" placeholder="example@mail.com">
                </div>

                <h2>Select Payment Method</h2>

               <label>
                  <input type="radio" name="payment" value="mobile_money" checked>
              Mobile Money
              </label><br>

             <label>
          <input type="radio" name="payment" value="card">
        Debit/Credit Card
           </label><br>

      <label>
  <input type="radio" name="payment" value="cash">
  Cash on Delivery
</label>

<br><br>

<div id="mobileMoneyDetails">
  <h3>Mobile Money Details</h3>
  <input type="text" placeholder="Phone Number"><br>
</div>

<div id="cardDetails" style="display:none;">
  <h3>Card Details</h3>
  <input type="text" placeholder="Card Number"><br>
  <input type="text" placeholder="Expiry Date"><br>
  <input type="text" placeholder="CVV"><br>
       </div>

        <br>
           <button onclick="processPayment()">Pay Now</button>

                <div class="form-group">
                    <label for="address">Delivery Address:</label>
                    <textarea id="address" name="address" rows="3" placeholder="Enter your street, city, etc."></textarea>
                </div>

                <!-- Error Message Display Area -->
                <div id="error-message" style="color: red; margin-bottom: 10px;"></div>

                <button type="submit" id="place-order-btn">Place Order</button>
            </form>
        </section>
    </main>

    <script src="script.js"></script>
    <script>
        // Specific logic to trigger validation on this page
        document.getElementById('checkout-form').addEventListener('submit', function(e) {
            e.preventDefault();
            if (typeof validateCheckout === 'function') {
                validateCheckout();
            }
        });
    </script>
</body>
</html>
